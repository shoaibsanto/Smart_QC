{% extends 'base.html' %}
{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 2rem; color: var(--primary);">Apply for Leave</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="leave_type">Leave Type</label>
            <select name="leave_type" id="leave_type" class="form-control" required>
                <option value="Casual">Casual</option>
                <option value="Sick">Sick</option>
                <option value="Earned">Earned</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label" for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label" for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" class="form-control" required>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="reason">Reason</label>
            <textarea name="reason" id="reason" rows="4" class="form-control" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Application</button>
    </form>
</div>
{% endblock %}
